- device_id: sample_roscore 
  className:  embedded.mas.bridges.ros.RosMaster
  microcontroller: 
      id: ros1 
      className: DefaultRos4EmbeddedMas  
      connectionString: ws://localhost:9090 #connection with ROS      
  perceptionTopics:
      - topicName: value1
        topicType: std_msgs/Int32
      - topicName: value2
        topicType: std_msgs/Int32  
      - topicName: current_time
        topicType: std_msgs/String
        beliefName: current_hour
  actions:       
    topicWritingActions:          
      - actionName: setpoint_local
        topicName: /uav0/mavros/setpoint_position/local
        topicType: geometry_msgs/PoseStamped
        params:
          - header:
            - seq
            - stamp
            - frame_id
          - pose:
            - position:
              - x
              - y
              - z
            - orientation:  
              - x
              - y
              - z
              - w